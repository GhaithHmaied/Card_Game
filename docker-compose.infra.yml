# PostgreSQL + Redis + RabbitMQ only (for local npm dev).
# Usage: docker compose -f docker-compose.infra.yml up -d
# Then: backend npm run start:dev, frontend npm run dev

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: coinche
      POSTGRES_PASSWORD: coinche_secret
      POSTGRES_DB: coinche_db
    ports:
      - "5432:5432"
    volumes:
      - coinche_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coinche"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 10s
      retries: 5

volumes:
  coinche_pgdata:
